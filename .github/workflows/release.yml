name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit_sha: ${{ steps.commit.outputs.commit_sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Update internal SDK dependencies
        run: |
          grep -E '^	' go.mod | grep 'github.com/slidebolt/sdk' | awk '{print $1"@latest"}' | xargs -r go get
          go mod tidy

      - name: Test
        run: go test ./...

      - name: Bump version
        id: version
        run: |
          CURRENT=$(git tag --sort=-version:refname | grep '^v' | head -1)
          CURRENT=${CURRENT:-v0.0.0}
          MAJOR=$(echo $CURRENT | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          echo "version=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

      - name: Commit dependency updates
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add go.mod go.sum
          if git diff --staged --quiet; then
            COMMIT_SHA=$(git rev-parse HEAD)
          else
            git commit -m "chore: update sdk deps for ${{ steps.version.outputs.version }}"
            git push origin main
            COMMIT_SHA=$(git rev-parse HEAD)
          fi
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine binary name
        id: bin
        run: echo "name=$(go list -m | xargs basename)" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o ${{ steps.bin.outputs.name }} .

      - name: Package
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          VERSION="${VERSION#v}"
          FILENAME="${{ steps.bin.outputs.name }}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar czf "$FILENAME" ${{ steps.bin.outputs.name }}
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: '*.tar.gz'
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Create and push tag
        run: |
          VERSION='${{ needs.prepare.outputs.version }}'
          COMMIT='${{ needs.prepare.outputs.commit_sha }}'
          if git ls-remote --tags origin "refs/tags/${VERSION}" | grep -q .; then
            echo "tag ${VERSION} already exists on origin"
            exit 1
          fi
          git tag "$VERSION" "$COMMIT"
          git push origin "refs/tags/$VERSION"

      - name: Create GitHub release
        run: gh release create ${{ needs.prepare.outputs.version }} --target ${{ needs.prepare.outputs.commit_sha }} --title ${{ needs.prepare.outputs.version }} --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload release assets
        run: |
          gh release upload ${{ needs.prepare.outputs.version }} dist/*/*.tar.gz --clobber
        env:
          GH_TOKEN: ${{ github.token }}
